name: Publish jRis

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.READ_PACKAGES_TOKEN }}</password>
              </server>
              <server>
                <id>github-publish</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.READ_PACKAGES_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Check Maven settings
        run: cat ~/.m2/settings.xml

      - name: Build and Deploy to GitHub Packages
        run: mvn -B clean deploy -e